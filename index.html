<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, -webkit-touch-callout=none">
    <title>База данных</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0f0f0f; color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased; user-select: none;
        }
        
        #app { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-item {
            display: flex; align-items: center; padding: 12px;
            background-color: #1c1c1d; border-radius: 12px; cursor: pointer; transition: background 0.2s;
        }
        .chat-item:active { background-color: #2c2c2e; }
        
        .avatar {
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600; color: #ffffff;
            margin-right: 12px; flex-shrink: 0; overflow: hidden; position: relative;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .chat-info { flex-grow: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-meta { font-size: 13px; color: #8e8e93; }

        #messages-view { display: none; }
        .header { 
            display: flex; align-items: center; padding-bottom: 15px; 
            border-bottom: 1px solid #2c2c2e; margin-bottom: 15px; 
            position: sticky; top: 0; background: #0f0f0f; z-index: 10; 
        }
        .back-btn { background: none; border: none; color: #0a84ff; font-size: 16px; margin-right: 15px; cursor: pointer; font-weight: 500; }
        .header-title { font-weight: 600; font-size: 18px; display: flex; align-items: center; }
        .header-username { font-size: 13px; color: #8e8e93; font-weight: 400; margin-left: 8px; margin-top: 2px; }

        .message-list { display: flex; flex-direction: column; gap: 16px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 10px; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; font-size: 15px; flex-shrink: 0; }
        
        .message-bubble {
            background-color: #1c1c1d; border-radius: 18px; border-bottom-left-radius: 4px;
            padding: 10px 14px; max-width: 85%;
        }
        
        .msg-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 10px; }
        .msg-sender { font-weight: 600; font-size: 14px; }
        .msg-time { font-size: 11px; color: #8e8e93; }
        
        .msg-action { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 5px; }
        .action-deleted { color: #ff453a; }
        .action-edited { color: #0a84ff; }
        .action-media { color: #bf5af2; }
        
        .msg-text { font-size: 15px; line-height: 1.4; word-break: break-word; color: #e5e5ea; }
        
        .edit-container { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
        .edit-col { flex: 1 1 0; min-width: 120px; background: #2c2c2e; border-radius: 8px; padding: 10px; position: relative; overflow: hidden; }
        .before-col { border-left: 3px solid #ff453a; }
        .after-col { border-left: 3px solid #30d158; }
        .edit-tag { font-size: 11px; text-transform: uppercase; color: #8e8e93; margin-bottom: 6px; font-weight: bold; }
        .edit-content { font-size: 14px; line-height: 1.4; color: #ffffff; word-break: break-word; }
        
        .loading { text-align: center; color: #8e8e93; margin-top: 50px; font-size: 15px; }

        /* Анимация и стили для модального окна (Зажатие) */
        #blur-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease;
        }
        #blur-modal.active { opacity: 1; visibility: visible; }
        
        .blur-modal-content {
            background: rgba(40, 40, 40, 0.3);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 30px 40px; border-radius: 20px;
            font-size: 18px; font-weight: 500; color: #ffffff;
            transform: scale(0.8); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        #blur-modal.active .blur-modal-content { transform: scale(1); }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-list-view">
        <div class="header"><div class="header-title">Перехват сообщений</div></div>
        <div id="loading-indicator" class="loading">Загрузка данных...</div>
        <div id="chat-list" class="chat-list"></div>
    </div>

    <div id="messages-view">
        <div class="header">
            <button class="back-btn" onclick="showChatList()">Назад</button>
            <div id="current-chat-title" class="header-title">
                <span id="header-name"></span>
                <span id="header-user" class="header-username"></span>
            </div>
        </div>
        <div id="message-list" class="message-list"></div>
    </div>
</div>

<!-- Модальное окно для зажатия -->
<div id="blur-modal" onclick="closeModal()">
    <div class="blur-modal-content">
        <span id="modal-username-text"></span>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDj5Ure84vcQ4K_ElWE8s4szAfwGsTCOXw",
        authDomain: "dialofspy.firebaseapp.com",
        projectId: "dialofspy",
        storageBucket: "dialofspy.firebasestorage.app",
        messagingSenderId: "823811007631",
        appId: "1:823811007631:web:c43a9992165d35921d3cfa",
        measurementId: "G-EKYFKLYLNR"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const userId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : null;
    let allLogs = [];

    const avatarColors = ['#ff6b6b', '#f06292', '#ba68c8', '#9575cd', '#7986cb', '#64b5f6', '#4fc3f7', '#4dd0e1', '#4db6ac', '#81c784', '#aed581', '#ffb74d', '#ff8a65'];

    function getAvatarColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        return avatarColors[Math.abs(hash) % avatarColors.length];
    }

    // ЛОГИКА ЗАЖАТИЯ (Long-press)
    let pressTimer;
    let isLongPress = false;

    function startPress(e, username) {
        if (!username) return; // Если юзернейма нет, ничего не делаем
        isLongPress = false;
        pressTimer = setTimeout(() => {
            isLongPress = true;
            document.getElementById('modal-username-text').innerText = username;
            document.getElementById('blur-modal').classList.add('active');
            
            // Легкая вибрация, если устройство поддерживает (эффект Телеграма)
            if (navigator.vibrate) navigator.vibrate(50);
        }, 500); // 500 мс = долгое зажатие
    }

    function cancelPress() {
        clearTimeout(pressTimer);
    }

    function closeModal() {
        document.getElementById('blur-modal').classList.remove('active');
    }

    function clickChat(e, chatId, cleanName, username) {
        if (isLongPress) {
            e.preventDefault();
            isLongPress = false; // Сбрасываем флаг после отпускания
            return; // Если было зажатие, не переходим в чат
        }
        showMessages(chatId, cleanName, username);
    }

    window.onload = () => {
        if (!userId) {
            document.getElementById('app').innerHTML = '<div class="loading">Доступ запрещен. Откройте через бота.</div>';
            return;
        }
        loadData();
    };

    function loadData() {
        db.collection('spy_logs')
          .where('owner_id', '==', userId)
          .get()
          .then((querySnapshot) => {
              allLogs = [];
              querySnapshot.forEach((doc) => { allLogs.push({ id: doc.id, ...doc.data() }); });
              
              allLogs.sort((a, b) => {
                  const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                  const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                  return timeB - timeA; 
              });

              document.getElementById('loading-indicator').style.display = 'none';
              renderChatList();
          })
          .catch((error) => {
              document.getElementById('loading-indicator').innerText = 'Ошибка загрузки данных.';
          });
    }

    function renderChatList() {
        const chatListEl = document.getElementById('chat-list');
        chatListEl.innerHTML = '';
        if (allLogs.length === 0) { chatListEl.innerHTML = '<div class="loading">Логов пока нет.</div>'; return; }

        const chats = {};
        allLogs.forEach(log => {
            if (!chats[log.chat_id]) {
                chats[log.chat_id] = { name: log.sender || "Неизвестный", count: 0, avatar: 'none' };
            }
            chats[log.chat_id].count++;
            if (log.avatar && log.avatar !== 'none') chats[log.chat_id].avatar = log.avatar;
        });

        for (const [chatId, data] of Object.entries(chats)) {
            // Извлекаем имя и юзернейм
            let cleanName = data.name;
            let username = '';
            if (data.name.includes(' (@')) {
                const parts = data.name.split(' (@');
                cleanName = parts[0];
                username = '@' + parts[1].replace(')', '');
            }

            const firstLetter = cleanName.charAt(0).toUpperCase() || '?';
            const bgColor = getAvatarColor(cleanName);
            
            let avatarHtml = `<div class="avatar" style="background-color: ${bgColor}"><span>${firstLetter}</span>`;
            if (data.avatar !== 'none') {
                avatarHtml += `<img src="${data.avatar}" class="avatar-img" onerror="this.style.display='none'">`;
            }
            avatarHtml += `</div>`;
            
            const item = document.createElement('div');
            item.className = 'chat-item';
            
            // Обработчики зажатия и клика
            item.onmousedown = (e) => startPress(e, username);
            item.onmouseup = cancelPress;
            item.onmouseleave = cancelPress;
            item.ontouchstart = (e) => startPress(e, username);
            item.ontouchend = cancelPress;
            item.ontouchcancel = cancelPress;
            item.onclick = (e) => clickChat(e, chatId, cleanName, username);

            item.innerHTML = `
                ${avatarHtml}
                <div class="chat-info">
                    <div class="chat-name">${cleanName}</div>
                    <div class="chat-meta">Сохранено сообщений: ${data.count}</div>
                </div>`;
            chatListEl.appendChild(item);
        }
    }

    function showMessages(chatId, cleanName, username) {
        document.getElementById('chat-list-view').style.display = 'none';
        document.getElementById('messages-view').style.display = 'block';
        
        // Устанавливаем заголовок чата и серый юзернейм сверху
        document.getElementById('header-name').innerText = cleanName;
        document.getElementById('header-user').innerText = username ? username : '';

        const msgListEl = document.getElementById('message-list');
        msgListEl.innerHTML = '';

        const chatLogs = allLogs.filter(log => log.chat_id === chatId).reverse();

        chatLogs.forEach(log => {
            const dateStr = formatDate(log.timestamp);
            const senderName = log.sender || "Неизвестный";
            
            let msgCleanName = senderName;
            if (senderName.includes(' (@')) {
                msgCleanName = senderName.split(' (@')[0];
            }

            const firstLetter = msgCleanName.charAt(0).toUpperCase() || '?';
            const bgColor = getAvatarColor(msgCleanName);
            
            let avatarHtml = `<div class="avatar msg-avatar" style="background-color: ${bgColor}"><span>${firstLetter}</span>`;
            if (log.avatar && log.avatar !== 'none') {
                avatarHtml += `<img src="${log.avatar}" class="avatar-img" onerror="this.style.display='none'">`;
            }
            avatarHtml += `</div>`;
            
            let actionText = '', actionClass = '';
            if (log.action === 'deleted') { actionText = 'Удалено'; actionClass = 'action-deleted'; }
            else if (log.action === 'edited') { actionText = 'Изменено'; actionClass = 'action-edited'; }
            else if (log.action === 'media') { actionText = 'Медиа'; actionClass = 'action-media'; }

            let messageContentHtml = '';

            if (log.action === 'edited' && log.text && log.text.includes(' | Стало: ')) {
                const parts = log.text.split(' | Стало: ');
                const beforeText = parts[0].replace('Было: ', '').trim();
                const afterText = parts[1].trim();
                
                messageContentHtml = `
                    <div class="edit-container">
                        <div class="edit-col before-col">
                            <div class="edit-tag">Было</div>
                            <div class="edit-content">${beforeText}</div>
                        </div>
                        <div class="edit-col after-col">
                            <div class="edit-tag">Стало</div>
                            <div class="edit-content">${afterText}</div>
                        </div>
                    </div>
                `;
            } else {
                messageContentHtml = `<div class="msg-text">${log.text}</div>`;
            }

            const msgEl = document.createElement('div');
            msgEl.className = 'msg-wrapper';
            msgEl.innerHTML = `
                ${avatarHtml}
                <div class="message-bubble">
                    <div class="msg-header">
                        <div>
                            <span class="msg-action ${actionClass}">${actionText}</span>
                            <span class="msg-sender" style="color: ${bgColor}">${msgCleanName}</span>
                        </div>
                        <span class="msg-time">${dateStr}</span>
                    </div>
                    ${messageContentHtml}
                </div>`;
            msgListEl.appendChild(msgEl);
        });
        
        setTimeout(() => { window.scrollTo(0, document.body.scrollHeight); }, 100);
    }

    function showChatList() {
        document.getElementById('messages-view').style.display = 'none';
        document.getElementById('chat-list-view').style.display = 'block';
    }

    function formatDate(firebaseTimestamp) {
        if (!firebaseTimestamp) return '';
        const date = firebaseTimestamp.toDate();
        return `${date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })} ${date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
    }
</script>
</body>
</html>
