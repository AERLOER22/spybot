<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>База данных</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        #app { padding: 15px; }
        
        /* Списки чатов */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            cursor: pointer;
        }
        .chat-item:active { background-color: #1a1a1a; }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #888888;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .chat-info { flex-grow: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-meta { font-size: 13px; color: #888888; }

        /* Внутри чата (сообщения) */
        #messages-view { display: none; }
        .header { display: flex; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2a2a2a; margin-bottom: 15px; }
        .back-btn { background: none; border: none; color: #ffffff; font-size: 16px; margin-right: 15px; cursor: pointer; padding: 5px; }
        .header-title { font-weight: bold; font-size: 18px; }

        .message-list { display: flex; flex-direction: column; gap: 12px; }
        .message-item { background-color: #121212; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #888888; }
        .msg-action { font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .action-deleted { color: #cccccc; }
        .action-edited { color: #999999; }
        .action-media { color: #aaaaaa; }
        .msg-text { font-size: 15px; line-height: 1.4; word-break: break-word; }
        
        .loading { text-align: center; color: #666; margin-top: 50px; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-list-view">
        <div class="header">
            <div class="header-title">Логи чатов</div>
        </div>
        <div id="loading-indicator" class="loading">Загрузка данных...</div>
        <div id="chat-list" class="chat-list"></div>
    </div>

    <div id="messages-view">
        <div class="header">
            <button class="back-btn" onclick="showChatList()">← Назад</button>
            <div id="current-chat-title" class="header-title">Чат</div>
        </div>
        <div id="message-list" class="message-list"></div>
    </div>
</div>

<script>
    // ТВОЙ НОВЫЙ КОНФИГ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDj5Ure84vcQ4K_ElWE8s4szAfwGsTCOXw",
        authDomain: "dialofspy.firebaseapp.com",
        projectId: "dialofspy",
        storageBucket: "dialofspy.firebasestorage.app",
        messagingSenderId: "823811007631",
        appId: "1:823811007631:web:c43a9992165d35921d3cfa",
        measurementId: "G-EKYFKLYLNR"
    };

    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    
    tg.expand();
    
    // Получаем ID пользователя из Телеграма
    const userId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : null;
    let allLogs = [];

    window.onload = () => {
        if (!userId) {
            document.getElementById('app').innerHTML = '<div class="loading">Доступ запрещен. Откройте приложение через бота.</div>';
            return;
        }
        loadData();
    };

    function loadData() {
        db.collection('spy_logs')
          .where('owner_id', '==', userId)
          .orderBy('timestamp', 'desc')
          .get()
          .then((querySnapshot) => {
              allLogs = [];
              querySnapshot.forEach((doc) => {
                  allLogs.push({ id: doc.id, ...doc.data() });
              });
              document.getElementById('loading-indicator').style.display = 'none';
              renderChatList();
          })
          .catch((error) => {
              document.getElementById('loading-indicator').innerText = 'Ошибка загрузки данных.';
              console.error("Ошибка:", error);
          });
    }

    function renderChatList() {
        const chatListEl = document.getElementById('chat-list');
        chatListEl.innerHTML = '';
        
        if (allLogs.length === 0) {
            chatListEl.innerHTML = '<div class="loading">Логов пока нет.</div>';
            return;
        }

        const chats = {};
        allLogs.forEach(log => {
            if (!chats[log.chat_id]) {
                chats[log.chat_id] = {
                    name: log.sender,
                    count: 0,
                    lastLog: log
                };
            }
            chats[log.chat_id].count++;
        });

        for (const [chatId, data] of Object.entries(chats)) {
            const firstLetter = data.name.charAt(0).toUpperCase() || '?';
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.onclick = () => showMessages(chatId, data.name);
            item.innerHTML = `
                <div class="avatar">${firstLetter}</div>
                <div class="chat-info">
                    <div class="chat-name">${data.name}</div>
                    <div class="chat-meta">Сохранено логов: ${data.count}</div>
                </div>
            `;
            chatListEl.appendChild(item);
        }
    }

    function showMessages(chatId, chatName) {
        document.getElementById('chat-list-view').style.display = 'none';
        document.getElementById('messages-view').style.display = 'block';
        document.getElementById('current-chat-title').innerText = chatName;

        const msgListEl = document.getElementById('message-list');
        msgListEl.innerHTML = '';

        const chatLogs = allLogs.filter(log => log.chat_id === chatId);

        chatLogs.forEach(log => {
            const dateStr = formatDate(log.timestamp);
            let actionText = '';
            let actionClass = '';

            if (log.action === 'deleted') { actionText = 'Удалено'; actionClass = 'action-deleted'; }
            else if (log.action === 'edited') { actionText = 'Изменено'; actionClass = 'action-edited'; }
            else if (log.action === 'media') { actionText = 'Медиа'; actionClass = 'action-media'; }

            const msgEl = document.createElement('div');
            msgEl.className = 'message-item';
            msgEl.innerHTML = `
                <div class="msg-header">
                    <span class="msg-action ${actionClass}">${actionText}</span>
                    <span>${dateStr}</span>
                </div>
                <div class="msg-text">${log.text}</div>
            `;
            msgListEl.appendChild(msgEl);
        });
    }

    function showChatList() {
        document.getElementById('messages-view').style.display = 'none';
        document.getElementById('chat-list-view').style.display = 'block';
    }

    function formatDate(firebaseTimestamp) {
        if (!firebaseTimestamp) return 'Время неизвестно';
        const date = firebaseTimestamp.toDate();
        const now = new Date();
        
        const timeOpts = { hour: '2-digit', minute: '2-digit' };
        const dateOpts = { day: 'numeric', month: 'short' };
        
        if (date.getFullYear() < now.getFullYear()) {
            dateOpts.year = 'numeric';
        }
        
        return `${date.toLocaleDateString('ru-RU', dateOpts)} ${date.toLocaleTimeString('ru-RU', timeOpts)}`;
    }
</script>
</body>
</html>
